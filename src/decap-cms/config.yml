backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images/journal"
public_folder: "/assets/images/journal"

collections:
  - name: "journal"
    label: "Yoga Journal"
    files:
      - name: "posts"
        label: "Journal Posts"
        file: "src/_data/journals.json"
        format: "json"
        fields:
          - name: "entries"
            label: "Posts"
            label_singular: "Post"
            widget: "list"
            summary: "{{fields.title_en}} — {{fields.date}}"
            collapsed: true
            fields:
              - { name: "slug", label: "URL Slug", widget: "string", hint: "Lowercase, hyphens only. Example: my-yoga-article" }
              - { name: "date", label: "Publish Date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { name: "author", label: "Author", widget: "string", default: "Yoga Bible" }
              - name: "category"
                label: "Category"
                widget: "select"
                options:
                  - { label: "Yoga Styles", value: "yoga-styles" }
                  - { label: "Pranayama", value: "pranayama" }
                  - { label: "Philosophy", value: "philosophy" }
                  - { label: "Wellness", value: "wellness" }
                  - { label: "Teacher Training", value: "teacher-training" }
              - { name: "tags", label: "Tags", widget: "list", hint: "Comma-separated tags" }
              - { name: "featured", label: "Featured", widget: "boolean", default: false }
              - { name: "gated", label: "Gated (Premium)", widget: "boolean", default: false }
              - { name: "image", label: "Featured Image", widget: "image", default: "/assets/images/og/og-1200x630.png" }
              - { name: "readTime_da", label: "Read Time (Danish)", widget: "string", default: "5 min", hint: "e.g. 6 min" }
              - { name: "readTime_en", label: "Read Time (English)", widget: "string", default: "5 min", hint: "e.g. 6 min" }
              - { name: "title_da", label: "Title (Danish)", widget: "string" }
              - { name: "title_en", label: "Title (English)", widget: "string" }
              - { name: "excerpt_da", label: "Excerpt (Danish)", widget: "text" }
              - { name: "excerpt_en", label: "Excerpt (English)", widget: "text" }
              - { name: "content_da", label: "Content (Danish)", widget: "markdown" }
              - { name: "content_en", label: "Content (English)", widget: "markdown" }
