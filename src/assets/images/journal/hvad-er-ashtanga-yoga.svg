<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <linearGradient id="ashtangaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f75c03;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ff9966;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <!-- 8 limbs represented as 8 ascending circles -->
  <circle cx="100" cy="420" r="35" fill="url(#ashtangaGrad)" opacity="0.4"/>
  <circle cx="240" cy="380" r="35" fill="url(#ashtangaGrad)" opacity="0.5"/>
  <circle cx="380" cy="340" r="35" fill="url(#ashtangaGrad)" opacity="0.55"/>
  <circle cx="520" cy="290" r="35" fill="url(#ashtangaGrad)" opacity="0.6"/>
  <circle cx="660" cy="240" r="35" fill="url(#ashtangaGrad)" opacity="0.65"/>
  <circle cx="800" cy="190" r="35" fill="url(#ashtangaGrad)" opacity="0.7"/>
  <circle cx="940" cy="140" r="35" fill="url(#ashtangaGrad)" opacity="0.8"/>
  <circle cx="1080" cy="90" r="35" fill="#f75c03" opacity="0.85"/>
  <polyline points="100,420 240,380 380,340 520,290 660,240 800,190 940,140 1080,90"
        stroke="#f75c03" stroke-width="2.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Subtle mat line at bottom -->
  <rect x="80" y="470" width="1040" height="4" rx="2" fill="#f75c03" opacity="0.2"/>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
    Ashtanga Yoga
  </text>
</svg>