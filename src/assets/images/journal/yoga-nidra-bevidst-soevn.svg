  </defs>
  <!-- Concentric awareness circles -->
  <circle cx="600" cy="260" r="200" fill="none" stroke="#f75c03" stroke-width="1" opacity="0.15"/>
  <circle cx="600" cy="260" r="160" fill="none" stroke="#f75c03" stroke-width="1.5" opacity="0.2"/>
  <circle cx="600" cy="260" r="120" fill="none" stroke="#f75c03" stroke-width="2" opacity="0.3"/>
  <circle cx="600" cy="260" r="80" fill="none" stroke="#f75c03" stroke-width="2" opacity="0.4"/>
  <circle cx="600" cy="260" r="40" fill="none" stroke="#f75c03" stroke-width="2.5" opacity="0.5"/>
