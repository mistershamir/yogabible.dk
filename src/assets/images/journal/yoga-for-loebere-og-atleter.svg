<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <linearGradient id="runGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f75c03;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Running track lines -->
  <path d="M 100 250 Q 400 200 600 250 T 1100 250" stroke="#f75c03" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M 100 280 Q 400 230 600 280 T 1100 280" stroke="#ff9966" stroke-width="1.5" fill="none" opacity="0.2"/>
  <!-- Dynamic motion lines -->
  <line x1="200" y1="300" x2="350" y2="300" stroke="#f75c03" stroke-width="2" opacity="0.2"/>
  <line x1="250" y1="320" x2="380" y2="320" stroke="#ff9966" stroke-width="1.5" opacity="0.15"/>
  <line x1="220" y1="340" x2="330" y2="340" stroke="#f75c03" stroke-width="1" opacity="0.1"/>
  <!-- Runner figure suggestion -->
  <circle cx="500" cy="200" r="25" fill="#f75c03" opacity="0.4"/>
  <line x1="500" y1="225" x2="480" y2="310" stroke="#f75c03" stroke-width="3" opacity="0.35"/>
  <line x1="480" y1="310" x2="460" y2="380" stroke="#f75c03" stroke-width="2.5" opacity="0.3"/>
  <line x1="480" y1="310" x2="520" y2="380" stroke="#f75c03" stroke-width="2.5" opacity="0.3"/>
  <!-- Yoga figure suggestion -->
  <circle cx="800" cy="200" r="25" fill="#ff9966" opacity="0.4"/>
  <line x1="800" y1="225" x2="800" y2="330" stroke="#ff9966" stroke-width="3" opacity="0.35"/>
  <line x1="760" y1="270" x2="840" y2="270" stroke="#ff9966" stroke-width="2.5" opacity="0.3"/>
  <!-- Arrow between -->
  <line x1="580" y1="260" x2="720" y2="260" stroke="#f75c03" stroke-width="2" opacity="0.3"/>
  <polygon points="720,260 710,253 710,267" fill="#f75c03" opacity="0.4"/>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
    Yoga for Løbere &amp; Atleter
  </text>
</svg>