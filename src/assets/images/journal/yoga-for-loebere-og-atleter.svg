<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>
  <circle cx="120" cy="180" r="100" fill="#ff9966" opacity="0.07"/>
  <circle cx="1080" cy="400" r="130" fill="#f75c03" opacity="0.06"/>

  <!-- Running figure (left) -->
  <g filter="url(#shadow)" transform="translate(320, 180)">
    <circle cx="0" cy="0" r="16" fill="#6F6A66" opacity="0.7"/>
    <line x1="0" y1="16" x2="5" y2="65" stroke="#6F6A66" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <!-- Running arms -->
    <line x1="5" y1="30" x2="-20" y2="15" stroke="#6F6A66" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="5" y1="30" x2="25" y2="50" stroke="#6F6A66" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <!-- Running legs -->
    <line x1="5" y1="65" x2="-20" y2="110" stroke="#6F6A66" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <line x1="5" y1="65" x2="30" y2="100" stroke="#6F6A66" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <!-- Speed lines -->
    <line x1="-40" y1="25" x2="-55" y2="25" stroke="#6F6A66" stroke-width="2" opacity="0.3"/>
    <line x1="-35" y1="40" x2="-55" y2="40" stroke="#6F6A66" stroke-width="2" opacity="0.25"/>
    <line x1="-38" y1="55" x2="-50" y2="55" stroke="#6F6A66" stroke-width="2" opacity="0.2"/>
  </g>

  <!-- Plus / merge symbol -->
  <g transform="translate(500, 250)" opacity="0.7">
    <circle cx="0" cy="0" r="30" fill="#f75c03" opacity="0.15"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Yoga figure (right) — Downward Dog -->
  <g filter="url(#shadow)" transform="translate(700, 200)">
    <circle cx="-30" cy="30" r="14" fill="#f75c03" opacity="0.85"/>
    <!-- Torso/spine (inverted V) -->
    <path d="M -60 100 L -20 30 L 60 100" fill="none" stroke="#f75c03" stroke-width="6" stroke-linecap="round"/>
    <!-- Arms down -->
    <line x1="-60" y1="100" x2="-65" y2="120" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
    <!-- Legs down -->
    <line x1="60" y1="100" x2="65" y2="120" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
    <!-- Hands and feet -->
    <circle cx="-65" cy="120" r="6" fill="#ff9966" opacity="0.7"/>
    <circle cx="65" cy="120" r="6" fill="#ff9966" opacity="0.7"/>
  </g>

  <!-- Benefits for athletes -->
  <g filter="url(#shadow)">
    <g transform="translate(200, 400)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#f75c03" opacity="0.9"/>
      <text x="0" y="4" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Recovery</text>
    </g>
    <g transform="translate(400, 400)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#ff9966" opacity="0.9"/>
      <text x="0" y="4" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Flexibility</text>
    </g>
    <g transform="translate(600, 400)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#d94f02" opacity="0.9"/>
      <text x="0" y="4" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Balance</text>
    </g>
    <g transform="translate(800, 400)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#f75c03" opacity="0.9"/>
      <text x="0" y="4" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Injury Prevention</text>
    </g>
    <g transform="translate(1000, 400)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#ff9966" opacity="0.9"/>
      <text x="0" y="4" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Mental Focus</text>
    </g>
  </g>

  <text x="600" y="510" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Yoga for Runners and Athletes</text>
  <text x="600" y="548" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" fill="#6F6A66" text-anchor="middle">Cross-Training for Performance</text>
</svg>
