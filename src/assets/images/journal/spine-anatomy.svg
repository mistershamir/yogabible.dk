<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="spineShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="7" flood-opacity="0.3" flood-color="#000"/>
    </filter>
    <linearGradient id="cervical" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f75c03;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="thoracic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f75c03;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff9966;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lumbar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d94f02;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f75c03;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>

  <circle cx="100" cy="250" r="100" fill="#ff9966" opacity="0.08"/>
  <circle cx="1100" cy="350" r="130" fill="#f75c03" opacity="0.09"/>

  <!-- Spine column with vertebrae -->
  <g filter="url(#spineShadow)">
    <!-- Cervical (C1-C7) - top section -->
    <circle cx="600" cy="80" r="32" fill="url(#cervical)" opacity="0.94" stroke="#d94f02" stroke-width="3"/>
    <circle cx="600" cy="80" r="26" fill="none" stroke="#ffb380" stroke-width="1.5" opacity="0.5"/>

    <circle cx="600" cy="140" r="28" fill="url(#cervical)" opacity="0.93" stroke="#d94f02" stroke-width="3"/>
    <circle cx="600" cy="140" r="23" fill="none" stroke="#ffb380" stroke-width="1.5" opacity="0.5"/>

    <circle cx="600" cy="195" r="28" fill="url(#cervical)" opacity="0.93" stroke="#d94f02" stroke-width="3"/>
    <circle cx="600" cy="195" r="23" fill="none" stroke="#ffb380" stroke-width="1.5" opacity="0.5"/>

    <!-- Connection lines (discs) -->
    <line x1="600" y1="112" x2="600" y2="128" stroke="#d94f02" stroke-width="3" opacity="0.6"/>
    <line x1="600" y1="168" x2="600" y2="183" stroke="#d94f02" stroke-width="3" opacity="0.6"/>

    <!-- Thoracic (T1-T12) - mid section -->
    <circle cx="600" cy="255" r="32" fill="url(#thoracic)" opacity="0.93" stroke="#0f0f0f" stroke-width="3"/>
    <circle cx="600" cy="255" r="26" fill="none" stroke="#ffc9a3" stroke-width="1.5" opacity="0.5"/>

    <circle cx="600" cy="320" r="32" fill="url(#thoracic)" opacity="0.93" stroke="#0f0f0f" stroke-width="3"/>
    <circle cx="600" cy="320" r="26" fill="none" stroke="#ffc9a3" stroke-width="1.5" opacity="0.5"/>

    <circle cx="600" cy="385" r="32" fill="url(#thoracic)" opacity="0.93" stroke="#0f0f0f" stroke-width="3"/>
    <circle cx="600" cy="385" r="26" fill="none" stroke="#ffc9a3" stroke-width="1.5" opacity="0.5"/>

    <!-- Connection lines -->
    <line x1="600" y1="223" x2="600" y2="243" stroke="#0f0f0f" stroke-width="3" opacity="0.5"/>
    <line x1="600" y1="287" x2="600" y2="308" stroke="#0f0f0f" stroke-width="3" opacity="0.5"/>
    <line x1="600" y1="352" x2="600" y2="373" stroke="#0f0f0f" stroke-width="3" opacity="0.5"/>

    <!-- Lumbar (L1-L5) - lower section -->
    <circle cx="600" cy="445" r="34" fill="url(#lumbar)" opacity="0.94" stroke="#0f0f0f" stroke-width="3"/>
    <circle cx="600" cy="445" r="28" fill="none" stroke="#ff9966" stroke-width="1.5" opacity="0.5"/>

    <circle cx="600" cy="510" r="35" fill="url(#lumbar)" opacity="0.94" stroke="#0f0f0f" stroke-width="3"/>
    <circle cx="600" cy="510" r="29" fill="none" stroke="#ff9966" stroke-width="1.5" opacity="0.5"/>

    <!-- Sacrum connection -->
    <line x1="600" y1="417" x2="600" y2="430" stroke="#0f0f0f" stroke-width="3" opacity="0.5"/>
    <line x1="600" y1="479" x2="600" y2="495" stroke="#0f0f0f" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- Lateral process indicators -->
  <g opacity="0.6" filter="url(#spineShadow)">
    <!-- Cervical processes -->
    <line x1="560" y1="80" x2="530" y2="70" stroke="#d94f02" stroke-width="2" stroke-linecap="round"/>
    <line x1="640" y1="80" x2="670" y2="70" stroke="#d94f02" stroke-width="2" stroke-linecap="round"/>

    <!-- Thoracic processes -->
    <line x1="560" y1="320" x2="520" y2="310" stroke="#f75c03" stroke-width="2" stroke-linecap="round"/>
    <line x1="640" y1="320" x2="680" y2="310" stroke="#f75c03" stroke-width="2" stroke-linecap="round"/>

    <!-- Lumbar processes -->
    <line x1="565" y1="445" x2="520" y2="435" stroke="#d94f02" stroke-width="3" stroke-linecap="round"/>
    <line x1="635" y1="445" x2="680" y2="435" stroke="#d94f02" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Region labels with background -->
  <g opacity="0.85" filter="url(#spineShadow)">
    <rect x="750" y="70" width="200" height="50" fill="#ff9966" opacity="0.15" rx="6" stroke="#d94f02" stroke-width="2"/>
    <text x="850" y="103" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Cervical</text>

    <rect x="750" y="280" width="200" height="50" fill="#f75c03" opacity="0.15" rx="6" stroke="#0f0f0f" stroke-width="2"/>
    <text x="850" y="313" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Thoracic</text>

    <rect x="750" y="460" width="200" height="50" fill="#d94f02" opacity="0.15" rx="6" stroke="#0f0f0f" stroke-width="2"/>
    <text x="850" y="493" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Lumbar</text>
  </g>

  <text x="600" y="590" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Spine Anatomy</text>
</svg>
