      <stop offset="0%" style="stop-color:#f75c03;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff9966;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <!-- Ancient scroll/book shape -->
  <rect x="350" y="80" width="500" height="380" rx="8" fill="url(#sutraGrad)" opacity="0.15"/>
  <rect x="350" y="80" width="500" height="380" rx="8" fill="none" stroke="#f75c03" stroke-width="1.5" opacity="0.3"/>
