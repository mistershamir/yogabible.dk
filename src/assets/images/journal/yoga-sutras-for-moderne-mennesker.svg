  <line x1="400" y1="260" x2="720" y2="260" stroke="#f75c03" stroke-width="1.5" opacity="0.14"/>
  <line x1="400" y1="300" x2="760" y2="300" stroke="#f75c03" stroke-width="1.5" opacity="0.12"/>
  <line x1="400" y1="340" x2="700" y2="340" stroke="#f75c03" stroke-width="1.5" opacity="0.1"/>
  <line x1="400" y1="380" x2="740" y2="380" stroke="#f75c03" stroke-width="1.5" opacity="0.08"/>
  <!-- 8-limbed path circle -->
  <circle cx="200" cy="270" r="80" fill="none" stroke="#f75c03" stroke-width="2" opacity="0.2"/>
  <circle cx="200" cy="190" r="8" fill="#f75c03" opacity="0.4"/>
  <circle cx="257" cy="213" r="8" fill="#f75c03" opacity="0.45"/>
  <circle cx="280" cy="270" r="8" fill="#f75c03" opacity="0.5"/>
  <circle cx="257" cy="327" r="8" fill="#f75c03" opacity="0.55"/>
  <circle cx="200" cy="350" r="8" fill="#f75c03" opacity="0.6"/>
  <circle cx="143" cy="327" r="8" fill="#f75c03" opacity="0.55"/>
  <circle cx="120" cy="270" r="8" fill="#f75c03" opacity="0.5"/>
  <circle cx="143" cy="213" r="8" fill="#f75c03" opacity="0.45"/>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
