<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
    <radialGradient id="stillCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f5f3f0;stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>

  <!-- Subtle radial glow -->
  <circle cx="600" cy="260" r="250" fill="url(#stillCenter)"/>

  <!-- Yin-Yang symbol (large, centered) -->
  <g filter="url(#shadow)" transform="translate(600, 250)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#f75c03" stroke-width="3" opacity="0.9"/>
    
    <!-- Yin half (dark) -->
    <path d="M 0 -160 A 160 160 0 0 1 0 160 A 80 80 0 0 0 0 0 A 80 80 0 0 1 0 -160" fill="#0f0f0f" opacity="0.15"/>
    
    <!-- Yang half (orange) -->
    <path d="M 0 -160 A 160 160 0 0 0 0 160 A 80 80 0 0 1 0 0 A 80 80 0 0 0 0 -160" fill="#f75c03" opacity="0.2"/>
    
    <!-- Inner dots -->
    <circle cx="0" cy="-80" r="22" fill="#f75c03" opacity="0.85"/>
    <circle cx="0" cy="80" r="22" fill="#0f0f0f" opacity="0.25"/>
    
    <!-- Inner dot details -->
    <circle cx="0" cy="-80" r="8" fill="#f5f3f0" opacity="0.6"/>
    <circle cx="0" cy="80" r="8" fill="#f75c03" opacity="0.5"/>
  </g>

  <!-- Ripple rings (stillness) -->
  <circle cx="600" cy="250" r="200" fill="none" stroke="#f75c03" stroke-width="1.5" opacity="0.2"/>
  <circle cx="600" cy="250" r="230" fill="none" stroke="#ff9966" stroke-width="1" opacity="0.12"/>
  <circle cx="600" cy="250" r="260" fill="none" stroke="#f75c03" stroke-width="0.8" opacity="0.08"/>

  <!-- Decorative dots (meditation) -->
  <g filter="url(#softGlow)" opacity="0.5">
    <circle cx="280" cy="150" r="4" fill="#f75c03"/>
    <circle cx="320" cy="180" r="3" fill="#ff9966"/>
    <circle cx="260" cy="200" r="3.5" fill="#d94f02"/>
    <circle cx="920" cy="140" r="4" fill="#f75c03"/>
    <circle cx="880" cy="170" r="3" fill="#ff9966"/>
    <circle cx="940" cy="190" r="3.5" fill="#d94f02"/>
  </g>

  <!-- Gentle breath line -->
  <path d="M 250 440 Q 350 420 450 440 Q 550 460 650 440 Q 750 420 850 440 Q 950 460 1050 440" fill="none" stroke="#f75c03" stroke-width="2" opacity="0.2" stroke-linecap="round"/>

  <text x="600" y="530" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Yin Yoga</text>
  <text x="600" y="570" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="20" fill="#6F6A66" text-anchor="middle">The Quiet Power Behind Flexibility</text>
</svg>
