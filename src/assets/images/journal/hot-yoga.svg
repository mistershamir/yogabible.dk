<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glowHeat">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowHeat" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="7" flood-opacity="0.35" flood-color="#000"/>
    </filter>
    <radialGradient id="heatCore" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#f75c03;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d94f02;stop-opacity:0.8"/>
    </radialGradient>
    <radialGradient id="heatAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f75c03;stop-opacity:0.2"/>
    </radialGradient>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#f75c03;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#ff9966;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>

  <circle cx="100" cy="150" r="100" fill="#ff9966" opacity="0.08"/>
  <circle cx="1100" cy="500" r="130" fill="#d94f02" opacity="0.1"/>

  <!-- Central radiating heat circles with aura -->
  <g filter="url(#glowHeat)">
    <!-- Outermost aura layer -->
    <circle cx="600" cy="315" r="200" fill="url(#heatAura)" opacity="0.4" stroke="#ff9966" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="600" cy="315" r="180" fill="none" stroke="#f75c03" stroke-width="2" stroke-opacity="0.2"/>
    <circle cx="600" cy="315" r="160" fill="none" stroke="#ff9966" stroke-width="2" stroke-opacity="0.25"/>
    <circle cx="600" cy="315" r="140" fill="none" stroke="#d94f02" stroke-width="2" stroke-opacity="0.2"/>
  </g>

  <!-- Heat radiating elements with shadow -->
  <g filter="url(#shadowHeat)">
    <!-- Left heat zone -->
    <circle cx="350" cy="250" r="80" fill="url(#heatCore)" opacity="0.93" stroke="#d94f02" stroke-width="4"/>
    <circle cx="350" cy="250" r="65" fill="none" stroke="#ff9966" stroke-width="2" opacity="0.6"/>

    <!-- Right heat zone -->
    <circle cx="850" cy="280" r="90" fill="url(#heatCore)" opacity="0.93" stroke="#d94f02" stroke-width="4"/>
    <circle cx="850" cy="280" r="75" fill="none" stroke="#ff9966" stroke-width="2" opacity="0.6"/>

    <!-- Center heat core -->
    <circle cx="600" cy="380" r="70" fill="url(#heatCore)" opacity="0.94" stroke="#0f0f0f" stroke-width="3"/>
    <circle cx="600" cy="380" r="55" fill="none" stroke="#ff9966" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Flames rising from heat zones -->
  <g filter="url(#shadowHeat)">
    <!-- Left flames -->
    <path d="M 320 180 Q 310 140 330 100 Q 340 110 345 160 Z" fill="url(#flameGrad)" opacity="0.85"/>
    <path d="M 360 190 Q 375 130 385 80 Q 380 120 370 160 Z" fill="url(#flameGrad)" opacity="0.8"/>
    <path d="M 380 175 Q 395 125 410 70 Q 400 115 385 155 Z" fill="url(#flameGrad)" opacity="0.8"/>

    <!-- Right flames -->
    <path d="M 820 200 Q 805 150 825 100 Q 835 125 845 170 Z" fill="url(#flameGrad)" opacity="0.85"/>
    <path d="M 860 210 Q 880 140 895 85 Q 885 130 875 170 Z" fill="url(#flameGrad)" opacity="0.8"/>
    <path d="M 880 195 Q 900 135 920 75 Q 905 125 885 160 Z" fill="url(#flameGrad)" opacity="0.8"/>

    <!-- Center flames -->
    <path d="M 570 310 Q 560 250 580 200 Q 585 240 580 290 Z" fill="url(#flameGrad)" opacity="0.82"/>
    <path d="M 630 310 Q 645 240 665 185 Q 655 235 635 290 Z" fill="url(#flameGrad)" opacity="0.82"/>
  </g>

  <!-- Heat wave effect dots -->
  <g opacity="0.6" filter="url(#glowHeat)">
    <circle cx="300" cy="350" r="4" fill="#f75c03"/>
    <circle cx="450" cy="420" r="4" fill="#ff9966"/>
    <circle cx="600" cy="460" r="5" fill="#d94f02"/>
    <circle cx="750" cy="420" r="4" fill="#ff9966"/>
    <circle cx="900" cy="350" r="4" fill="#f75c03"/>
  </g>

  <text x="600" y="590" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Hot Yoga Benefits</text>
</svg>
