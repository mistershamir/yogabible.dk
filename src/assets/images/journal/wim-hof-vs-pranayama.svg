<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="compareShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-opacity="0.35" flood-color="#000"/>
    </filter>
    <linearGradient id="wimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d94f02;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pranaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f75c03;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>

  <circle cx="100" cy="300" r="100" fill="#ff9966" opacity="0.08"/>
  <circle cx="1100" cy="300" r="130" fill="#d94f02" opacity="0.09"/>

  <!-- Dividing line -->
  <line x1="600" y1="80" x2="600" y2="520" stroke="#0f0f0f" stroke-width="5" opacity="0.25" stroke-linecap="round"/>
  <line x1="600" y1="85" x2="600" y2="515" stroke="#f75c03" stroke-width="2" opacity="0.5" stroke-dasharray="10,8"/>

  <!-- LEFT: WIM HOF METHOD -->
  <g filter="url(#compareShadow)">
    <!-- Breath cycle indicator -->
    <circle cx="350" cy="200" r="70" fill="url(#wimGrad)" opacity="0.85" stroke="#d94f02" stroke-width="4"/>
    <circle cx="350" cy="200" r="50" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.5"/>

    <!-- Temperature/cold symbol -->
    <path d="M 350 280 L 330 320 L 350 310 L 370 320 Z" fill="url(#wimGrad)" opacity="0.9" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Intensity arrows -->
    <path d="M 280 150 L 260 120" stroke="#d94f02" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M 420 250 L 450 270" stroke="#d94f02" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

    <!-- Breathing waves -->
    <path d="M 240 230 Q 260 210 280 230" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    <path d="M 420 240 Q 400 220 380 240" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.7" stroke-linecap="round"/>

    <!-- Label -->
    <rect x="250" y="360" width="200" height="45" fill="#ff6b6b" opacity="0.15" rx="8" stroke="#d94f02" stroke-width="2"/>
    <text x="350" y="392" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Wim Hof Method</text>
  </g>

  <!-- RIGHT: PRANAYAMA -->
  <g filter="url(#compareShadow)">
    <!-- Harmonious breath cycle -->
    <circle cx="850" cy="200" r="70" fill="url(#pranaGrad)" opacity="0.85" stroke="#f75c03" stroke-width="4"/>
    <circle cx="850" cy="200" r="50" fill="none" stroke="#ffb380" stroke-width="2" opacity="0.5"/>

    <!-- Balanced energy symbol -->
    <path d="M 850 130 Q 830 150 850 170 Q 870 150 850 130" fill="url(#pranaGrad)" opacity="0.9" stroke="#0f0f0f" stroke-width="2"/>
    <path d="M 850 280 Q 830 260 850 240 Q 870 260 850 280" fill="url(#pranaGrad)" opacity="0.9" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Flow arrows -->
    <path d="M 920 150 L 950 120" stroke="#f75c03" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M 780 280 L 750 310" stroke="#f75c03" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

    <!-- Rhythmic breathing waves -->
    <path d="M 760 230 Q 780 210 800 230" fill="none" stroke="#ffb380" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
    <path d="M 900 240 Q 920 220 940 240" fill="none" stroke="#ffb380" stroke-width="3" opacity="0.7" stroke-linecap="round"/>

    <!-- Label -->
    <rect x="750" y="360" width="200" height="45" fill="#f75c03" opacity="0.15" rx="8" stroke="#f75c03" stroke-width="2"/>
    <text x="850" y="392" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Pranayama</text>
  </g>

  <!-- Comparison characteristics -->
  <g opacity="0.7" filter="url(#compareShadow)" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12">
    <text x="350" y="440" text-anchor="middle" fill="#d94f02" font-weight="bold">Intense</text>
    <text x="350" y="460" text-anchor="middle" fill="#0f0f0f">Dynamic</text>

    <text x="850" y="440" text-anchor="middle" fill="#f75c03" font-weight="bold">Balanced</text>
    <text x="850" y="460" text-anchor="middle" fill="#0f0f0f">Meditative</text>
  </g>

  <text x="600" y="590" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Wim Hof vs Pranayama</text>
</svg>
