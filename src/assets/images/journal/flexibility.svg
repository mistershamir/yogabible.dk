<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>
  <circle cx="130" cy="180" r="110" fill="#ff9966" opacity="0.07"/>
  <circle cx="1070" cy="400" r="140" fill="#f75c03" opacity="0.06"/>

  <!-- Progressive splits illustration -->
  <g filter="url(#shadow)">
    <!-- Stage 1: Standing -->
    <g transform="translate(250, 180)" opacity="0.5">
      <circle cx="0" cy="0" r="14" fill="#ff9966"/>
      <line x1="0" y1="14" x2="0" y2="60" stroke="#ff9966" stroke-width="5" stroke-linecap="round"/>
      <line x1="-18" y1="35" x2="18" y2="35" stroke="#ff9966" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="60" x2="-12" y2="95" stroke="#ff9966" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="60" x2="12" y2="95" stroke="#ff9966" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="120" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66" text-anchor="middle">Week 1</text>
    </g>

    <!-- Stage 2: Wide stance -->
    <g transform="translate(430, 180)" opacity="0.65">
      <circle cx="0" cy="0" r="14" fill="#f75c03" opacity="0.8"/>
      <line x1="0" y1="14" x2="0" y2="55" stroke="#f75c03" stroke-width="5" stroke-linecap="round"/>
      <line x1="-18" y1="32" x2="18" y2="32" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="55" x2="-25" y2="95" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="55" x2="25" y2="95" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="120" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66" text-anchor="middle">Week 4</text>
    </g>

    <!-- Stage 3: Deep lunge -->
    <g transform="translate(610, 180)" opacity="0.8">
      <circle cx="0" cy="0" r="14" fill="#f75c03"/>
      <line x1="0" y1="14" x2="0" y2="50" stroke="#f75c03" stroke-width="5" stroke-linecap="round"/>
      <line x1="-18" y1="30" x2="18" y2="30" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="50" x2="-35" y2="90" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="50" x2="35" y2="90" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="120" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66" text-anchor="middle">Week 8</text>
    </g>

    <!-- Stage 4: Near splits -->
    <g transform="translate(790, 185)" opacity="0.9">
      <circle cx="0" cy="0" r="14" fill="#d94f02"/>
      <line x1="0" y1="14" x2="0" y2="40" stroke="#d94f02" stroke-width="5" stroke-linecap="round"/>
      <line x1="-18" y1="25" x2="18" y2="25" stroke="#d94f02" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="40" x2="-50" y2="80" stroke="#d94f02" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="40" x2="50" y2="80" stroke="#d94f02" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="110" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66" text-anchor="middle">Week 12</text>
    </g>

    <!-- Stage 5: Full split! -->
    <g transform="translate(970, 195)" opacity="1">
      <circle cx="0" cy="0" r="16" fill="#f75c03"/>
      <line x1="0" y1="16" x2="0" y2="35" stroke="#f75c03" stroke-width="5" stroke-linecap="round"/>
      <line x1="-18" y1="22" x2="18" y2="22" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="35" x2="-70" y2="55" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="35" x2="70" y2="55" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="85" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="13" fill="#d94f02" text-anchor="middle" font-weight="bold">Goal!</text>
    </g>
  </g>

  <!-- Progress arrow -->
  <path d="M 200 350 L 1000 350" fill="none" stroke="#f75c03" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  <polygon points="1000,350 985,343 985,357" fill="#f75c03" opacity="0.3"/>

  <!-- Angle measurement -->
  <g transform="translate(600, 380)" opacity="0.4">
    <path d="M -80 0 A 80 80 0 0 1 80 0" fill="none" stroke="#f75c03" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="0" y="25" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" fill="#f75c03" text-anchor="middle">180°</text>
  </g>

  <text x="600" y="490" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Splits for Everyone</text>
  <text x="600" y="530" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" fill="#6F6A66" text-anchor="middle">Systematic Flexibility Training</text>
</svg>
