<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="flexShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-opacity="0.35" flood-color="#000"/>
    </filter>
    <linearGradient id="flexGradLeft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f75c03;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="flexGradRight" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f75c03;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d94f02;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>

  <circle cx="100" cy="400" r="110" fill="#f75c03" opacity="0.08"/>
  <circle cx="1100" cy="200" r="130" fill="#ff9966" opacity="0.1"/>

  <!-- Left figure stretching upward -->
  <g filter="url(#flexShadow)">
    <!-- Base -->
    <circle cx="280" cy="460" r="50" fill="url(#flexGradLeft)" opacity="0.9" stroke="#d94f02" stroke-width="4"/>

    <!-- Legs -->
    <line x1="280" y1="410" x2="260" y2="340" stroke="url(#flexGradLeft)" stroke-width="16" stroke-linecap="round" opacity="0.9" fill="none"/>

    <!-- Core -->
    <ellipse cx="280" cy="300" rx="35" ry="55" fill="url(#flexGradLeft)" opacity="0.88" stroke="#d94f02" stroke-width="3"/>

    <!-- Left arm reaching up -->
    <path d="M 250 250 L 200 150 L 190 100" stroke="url(#flexGradLeft)" stroke-width="15" stroke-linecap="round" opacity="0.92" fill="none"/>
    <circle cx="190" cy="100" r="18" fill="#ff9966" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Right arm support -->
    <line x1="310" y1="250" x2="350" y2="300" stroke="url(#flexGradLeft)" stroke-width="14" stroke-linecap="round" opacity="0.85" fill="none"/>
    <circle cx="350" cy="300" r="16" fill="#f75c03" opacity="0.85" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Head -->
    <circle cx="280" cy="230" r="22" fill="#d94f02" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>
  </g>

  <!-- Right figure stretching downward -->
  <g filter="url(#flexShadow)">
    <!-- Base -->
    <circle cx="920" cy="180" r="50" fill="url(#flexGradRight)" opacity="0.9" stroke="#0f0f0f" stroke-width="4"/>

    <!-- Legs going down -->
    <path d="M 920 230 L 910 320 L 900 390" stroke="url(#flexGradRight)" stroke-width="16" stroke-linecap="round" opacity="0.9" fill="none"/>
    <circle cx="900" cy="390" r="18" fill="#d94f02" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Core -->
    <ellipse cx="920" cy="290" rx="35" ry="55" fill="url(#flexGradRight)" opacity="0.88" stroke="#0f0f0f" stroke-width="3"/>

    <!-- Left arm support -->
    <line x1="890" y1="250" x2="850" y2="300" stroke="url(#flexGradRight)" stroke-width="14" stroke-linecap="round" opacity="0.85" fill="none"/>
    <circle cx="850" cy="300" r="16" fill="#f75c03" opacity="0.85" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Right arm reaching down -->
    <path d="M 950 250 L 1000 150 L 1010 100" stroke="url(#flexGradRight)" stroke-width="15" stroke-linecap="round" opacity="0.92" fill="none"/>
    <circle cx="1010" cy="100" r="18" fill="#ff9966" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Head -->
    <circle cx="920" cy="220" r="22" fill="#f75c03" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>
  </g>

  <!-- Range of motion indicators -->
  <g opacity="0.6" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- Left arc -->
    <path d="M 190 120 Q 150 200 200 280" stroke="#f75c03" stroke-dasharray="6,4"/>

    <!-- Right arc -->
    <path d="M 1010 120 Q 1050 200 1000 280" stroke="#d94f02" stroke-dasharray="6,4"/>

    <!-- Center connection -->
    <path d="M 350 330 Q 600 380 850 330" stroke="#ff9966" stroke-dasharray="8,6"/>
  </g>

  <!-- Flexibility scale dots -->
  <g filter="url(#flexShadow)" opacity="0.8">
    <circle cx="500" cy="360" r="5" fill="#f75c03"/>
    <circle cx="600" cy="370" r="5" fill="#ff9966"/>
    <circle cx="700" cy="360" r="5" fill="#d94f02"/>
  </g>

  <text x="600" y="590" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Flexibility Guide</text>
</svg>
