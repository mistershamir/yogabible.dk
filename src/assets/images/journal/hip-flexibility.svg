<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>
  <circle cx="130" cy="200" r="100" fill="#ff9966" opacity="0.07"/>
  <circle cx="1070" cy="420" r="130" fill="#f75c03" opacity="0.06"/>

  <!-- Office desk silhouette (left side) -->
  <g filter="url(#shadow)" transform="translate(280, 120)" opacity="0.3">
    <rect x="0" y="80" width="180" height="10" rx="3" fill="#6F6A66"/>
    <rect x="10" y="90" width="8" height="100" fill="#6F6A66"/>
    <rect x="162" y="90" width="8" height="100" fill="#6F6A66"/>
    <!-- Monitor -->
    <rect x="50" y="20" width="80" height="55" rx="4" fill="#6F6A66" opacity="0.6"/>
    <rect x="80" y="75" width="20" height="8" fill="#6F6A66" opacity="0.5"/>
    <!-- Seated figure -->
    <circle cx="40" cy="50" r="10" fill="#6F6A66"/>
    <path d="M 40 60 L 40 100 L 30 130" fill="none" stroke="#6F6A66" stroke-width="3" stroke-linecap="round"/>
    <path d="M 40 100 L 55 130" fill="none" stroke="#6F6A66" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Hip joint diagram (center) -->
  <g filter="url(#shadow)" transform="translate(600, 230)">
    <!-- Pelvis outline -->
    <path d="M -80 -20 Q -60 -50 0 -60 Q 60 -50 80 -20 L 60 40 Q 0 50 -60 40 Z" fill="#f75c03" opacity="0.12" stroke="#f75c03" stroke-width="2.5"/>
    
    <!-- Hip sockets -->
    <circle cx="-40" cy="10" r="25" fill="none" stroke="#f75c03" stroke-width="3" opacity="0.8"/>
    <circle cx="-40" cy="10" r="15" fill="#f75c03" opacity="0.3"/>
    <circle cx="40" cy="10" r="25" fill="none" stroke="#d94f02" stroke-width="3" opacity="0.8"/>
    <circle cx="40" cy="10" r="15" fill="#d94f02" opacity="0.3"/>
    
    <!-- Femur heads -->
    <circle cx="-40" cy="10" r="8" fill="#d94f02" opacity="0.8"/>
    <circle cx="40" cy="10" r="8" fill="#f75c03" opacity="0.8"/>
    
    <!-- Femurs -->
    <line x1="-40" y1="35" x2="-50" y2="100" stroke="#d94f02" stroke-width="5" stroke-linecap="round"/>
    <line x1="40" y1="35" x2="50" y2="100" stroke="#f75c03" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Range of motion arcs -->
    <path d="M -65 10 A 25 25 0 0 1 -15 10" fill="none" stroke="#ff9966" stroke-width="2" stroke-dasharray="3,3" opacity="0.6"/>
    <path d="M 15 10 A 25 25 0 0 1 65 10" fill="none" stroke="#ff9966" stroke-width="2" stroke-dasharray="3,3" opacity="0.6"/>
  </g>

  <!-- Pigeon pose figure (right) -->
  <g filter="url(#shadow)" transform="translate(900, 230)" opacity="0.7">
    <circle cx="0" cy="-20" r="14" fill="#f75c03"/>
    <path d="M 0 -6 Q -5 20 -10 50" fill="none" stroke="#f75c03" stroke-width="5" stroke-linecap="round"/>
    <path d="M -10 50 L -40 70" fill="none" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
    <path d="M -10 50 L 40 80" fill="none" stroke="#ff9966" stroke-width="4" stroke-linecap="round"/>
    <line x1="-15" y1="10" x2="15" y2="5" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Benefit labels -->
  <g font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle" opacity="0.65">
    <rect x="200" y="410" width="130" height="32" rx="16" fill="#f75c03" opacity="0.12" stroke="#f75c03" stroke-width="1.5"/>
    <text x="265" y="431" fill="#d94f02" font-weight="bold">Less Pain</text>
    
    <rect x="380" y="410" width="130" height="32" rx="16" fill="#ff9966" opacity="0.12" stroke="#ff9966" stroke-width="1.5"/>
    <text x="445" y="431" fill="#d94f02" font-weight="bold">More Range</text>
    
    <rect x="560" y="410" width="130" height="32" rx="16" fill="#d94f02" opacity="0.12" stroke="#d94f02" stroke-width="1.5"/>
    <text x="625" y="431" fill="#d94f02" font-weight="bold">Better Posture</text>
    
    <rect x="740" y="410" width="130" height="32" rx="16" fill="#f75c03" opacity="0.12" stroke="#f75c03" stroke-width="1.5"/>
    <text x="805" y="431" fill="#d94f02" font-weight="bold">Free Movement</text>
  </g>

  <text x="600" y="530" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Open Hips for Office Workers</text>
  <text x="600" y="568" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" fill="#6F6A66" text-anchor="middle">Unlock Your Hip Flexibility</text>
</svg>
