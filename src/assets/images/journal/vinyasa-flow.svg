<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#f75c03;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d94f02;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>
  <circle cx="100" cy="200" r="100" fill="#ff9966" opacity="0.07"/>
  <circle cx="1100" cy="400" r="130" fill="#f75c03" opacity="0.06"/>

  <!-- Flowing wave (main visual) -->
  <g filter="url(#shadow)">
    <path d="M 50 320 C 150 200 250 380 400 280 C 550 180 650 400 800 300 C 950 200 1050 350 1150 280" fill="none" stroke="url(#flowGrad)" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
    <path d="M 50 340 C 150 220 250 400 400 300 C 550 200 650 420 800 320 C 950 220 1050 370 1150 300" fill="none" stroke="#ff9966" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <path d="M 50 360 C 150 240 250 420 400 320 C 550 220 650 440 800 340 C 950 240 1050 390 1150 320" fill="none" stroke="#f75c03" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Pose silhouettes along the flow -->
  <g filter="url(#shadow)" opacity="0.85">
    <!-- Mountain pose -->
    <g transform="translate(200, 220)">
      <circle cx="0" cy="-40" r="12" fill="#f75c03"/>
      <line x1="0" y1="-28" x2="0" y2="10" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
      <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="10" x2="-10" y2="35" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="10" x2="10" y2="35" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Forward fold -->
    <g transform="translate(450, 220)">
      <circle cx="10" cy="-15" r="12" fill="#d94f02"/>
      <path d="M 0 20 Q 5 -5 10 -5" fill="none" stroke="#d94f02" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="20" x2="-10" y2="45" stroke="#d94f02" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="20" x2="10" y2="45" stroke="#d94f02" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Upward dog -->
    <g transform="translate(700, 240)">
      <circle cx="-5" cy="-35" r="12" fill="#f75c03"/>
      <path d="M 20 15 Q 0 5 -5 -22" fill="none" stroke="#f75c03" stroke-width="4" stroke-linecap="round"/>
      <line x1="20" y1="15" x2="35" y2="20" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
      <line x1="-15" y1="10" x2="-25" y2="20" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Warrior -->
    <g transform="translate(950, 210)">
      <circle cx="0" cy="-40" r="12" fill="#d94f02"/>
      <line x1="0" y1="-28" x2="0" y2="5" stroke="#d94f02" stroke-width="4" stroke-linecap="round"/>
      <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#d94f02" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="5" x2="-18" y2="35" stroke="#d94f02" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="5" x2="18" y2="30" stroke="#d94f02" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Breath dots -->
  <g opacity="0.5">
    <circle cx="130" cy="310" r="5" fill="#ff9966"/>
    <circle cx="330" cy="300" r="4" fill="#f75c03"/>
    <circle cx="570" cy="280" r="5" fill="#ff9966"/>
    <circle cx="830" cy="310" r="4" fill="#d94f02"/>
    <circle cx="1080" cy="290" r="5" fill="#f75c03"/>
  </g>

  <text x="600" y="530" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">What is Vinyasa Yoga?</text>
  <text x="600" y="570" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" fill="#6F6A66" text-anchor="middle">Movement, Breath, Flow</text>
</svg>
