<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <linearGradient id="kumbGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.3" />
      <stop offset="30%" style="stop-color:#f75c03;stop-opacity:0.7" />
      <stop offset="70%" style="stop-color:#f75c03;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ff9966;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <!-- Breath hold visualization: inhale - HOLD - exhale -->
  <!-- Inhale rise -->
  <path d="M 100 350 Q 200 350 300 200" stroke="#ff9966" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Hold plateau -->
  <line x1="300" y1="200" x2="900" y2="200" stroke="url(#kumbGrad)" stroke-width="4" opacity="0.6"/>
  <!-- Exhale descent -->
  <path d="M 900 200 Q 1000 350 1100 350" stroke="#ff9966" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Lock/bandha symbols on hold line -->
  <rect x="430" y="180" width="40" height="40" rx="8" fill="#f75c03" opacity="0.3"/>
  <rect x="580" y="180" width="40" height="40" rx="8" fill="#f75c03" opacity="0.4"/>
  <rect x="730" y="180" width="40" height="40" rx="8" fill="#f75c03" opacity="0.3"/>
  <!-- Energy dots along plateau -->
  <circle cx="350" cy="200" r="4" fill="#f75c03" opacity="0.5"/>
  <circle cx="450" cy="200" r="5" fill="#f75c03" opacity="0.6"/>
  <circle cx="600" cy="200" r="6" fill="#f75c03" opacity="0.7"/>
  <circle cx="750" cy="200" r="5" fill="#f75c03" opacity="0.6"/>
  <circle cx="850" cy="200" r="4" fill="#f75c03" opacity="0.5"/>
  <!-- Labels -->
  <text x="180" y="400" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="16" fill="#6F6A66" text-anchor="middle" opacity="0.6">Indånding</text>
  <text x="600" y="160" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#f75c03" text-anchor="middle" opacity="0.6">Kumbhaka</text>
  <text x="1020" y="400" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="16" fill="#6F6A66" text-anchor="middle" opacity="0.6">Udånding</text>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
    Avanceret Pranayama
  </text>
</svg>