<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
    <radialGradient id="heatRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d94f02;stop-opacity:0.25"/>
      <stop offset="40%" style="stop-color:#f75c03;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#f5f3f0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>

  <!-- Heat radiation center -->
  <circle cx="600" cy="240" r="250" fill="url(#heatRadial)"/>

  <!-- Infrared panel (top) -->
  <g filter="url(#shadow)" transform="translate(600, 80)">
    <rect x="-120" y="-20" width="240" height="40" rx="6" fill="#0f0f0f" opacity="0.15"/>
    <rect x="-110" y="-14" width="220" height="28" rx="4" fill="#d94f02" opacity="0.3"/>
    <!-- Panel glow lines -->
    <line x1="-80" y1="-10" x2="-80" y2="14" stroke="#f75c03" stroke-width="3" opacity="0.5"/>
    <line x1="-40" y1="-10" x2="-40" y2="14" stroke="#f75c03" stroke-width="3" opacity="0.5"/>
    <line x1="0" y1="-10" x2="0" y2="14" stroke="#f75c03" stroke-width="3" opacity="0.5"/>
    <line x1="40" y1="-10" x2="40" y2="14" stroke="#f75c03" stroke-width="3" opacity="0.5"/>
    <line x1="80" y1="-10" x2="80" y2="14" stroke="#f75c03" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- Infrared waves (emanating down) -->
  <g opacity="0.35">
    <path d="M 480 110 Q 490 160 480 210 Q 470 260 480 310" fill="none" stroke="#d94f02" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 530 110 Q 540 165 530 220 Q 520 275 530 330" fill="none" stroke="#f75c03" stroke-width="2" stroke-linecap="round"/>
    <path d="M 580 110 Q 590 170 580 230 Q 570 290 580 350" fill="none" stroke="#ff9966" stroke-width="2" stroke-linecap="round"/>
    <path d="M 620 110 Q 610 170 620 230 Q 630 290 620 350" fill="none" stroke="#ff9966" stroke-width="2" stroke-linecap="round"/>
    <path d="M 670 110 Q 660 165 670 220 Q 680 275 670 330" fill="none" stroke="#f75c03" stroke-width="2" stroke-linecap="round"/>
    <path d="M 720 110 Q 710 160 720 210 Q 730 260 720 310" fill="none" stroke="#d94f02" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Body silhouette (absorbing heat) -->
  <g filter="url(#shadow)" transform="translate(600, 260)" opacity="0.7">
    <!-- Head -->
    <circle cx="0" cy="-60" r="22" fill="#f75c03" opacity="0.7"/>
    <!-- Torso -->
    <path d="M -35 -35 Q -40 10 -35 50 L 35 50 Q 40 10 35 -35 Z" fill="#f75c03" opacity="0.2" stroke="#f75c03" stroke-width="2"/>
    <!-- Arms -->
    <line x1="-35" y1="-20" x2="-60" y2="30" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
    <line x1="35" y1="-20" x2="60" y2="30" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="-20" y1="50" x2="-25" y2="110" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="50" x2="25" y2="110" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Heat absorption points -->
    <circle cx="-15" cy="-10" r="6" fill="#d94f02" opacity="0.5"/>
    <circle cx="15" cy="5" r="5" fill="#f75c03" opacity="0.45"/>
    <circle cx="0" cy="25" r="6" fill="#d94f02" opacity="0.5"/>
  </g>

  <!-- Benefits list -->
  <g font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="13" opacity="0.65">
    <g transform="translate(250, 200)">
      <circle cx="-8" cy="-4" r="4" fill="#f75c03"/>
      <text x="4" y="0" fill="#6F6A66">Deep tissue warming</text>
    </g>
    <g transform="translate(250, 230)">
      <circle cx="-8" cy="-4" r="4" fill="#ff9966"/>
      <text x="4" y="0" fill="#6F6A66">Improved circulation</text>
    </g>
    <g transform="translate(250, 260)">
      <circle cx="-8" cy="-4" r="4" fill="#d94f02"/>
      <text x="4" y="0" fill="#6F6A66">Muscle recovery</text>
    </g>
    <g transform="translate(250, 290)">
      <circle cx="-8" cy="-4" r="4" fill="#f75c03"/>
      <text x="4" y="0" fill="#6F6A66">Detoxification</text>
    </g>

    <g transform="translate(830, 200)">
      <circle cx="-8" cy="-4" r="4" fill="#f75c03"/>
      <text x="4" y="0" fill="#6F6A66">Flexibility boost</text>
    </g>
    <g transform="translate(830, 230)">
      <circle cx="-8" cy="-4" r="4" fill="#ff9966"/>
      <text x="4" y="0" fill="#6F6A66">Pain relief</text>
    </g>
    <g transform="translate(830, 260)">
      <circle cx="-8" cy="-4" r="4" fill="#d94f02"/>
      <text x="4" y="0" fill="#6F6A66">Skin health</text>
    </g>
    <g transform="translate(830, 290)">
      <circle cx="-8" cy="-4" r="4" fill="#f75c03"/>
      <text x="4" y="0" fill="#6F6A66">Stress reduction</text>
    </g>
  </g>

  <text x="600" y="500" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Infrared Heat and Your Body</text>
  <text x="600" y="538" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" fill="#6F6A66" text-anchor="middle">The Science Behind the Warmth</text>
</svg>
