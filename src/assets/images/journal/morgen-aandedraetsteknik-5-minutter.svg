<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f75c03;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ff9966;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Rising sun -->
  <circle cx="600" cy="350" r="180" fill="url(#sunGrad)"/>
  <circle cx="600" cy="350" r="70" fill="#f75c03" opacity="0.5"/>
  <!-- Horizon line -->
  <line x1="100" y1="350" x2="1100" y2="350" stroke="#f75c03" stroke-width="2" opacity="0.3"/>
  <!-- Sun rays -->
  <line x1="600" y1="200" x2="600" y2="140" stroke="#f75c03" stroke-width="2" opacity="0.35"/>
  <line x1="700" y1="220" x2="740" y2="170" stroke="#ff9966" stroke-width="1.5" opacity="0.3"/>
  <line x1="500" y1="220" x2="460" y2="170" stroke="#ff9966" stroke-width="1.5" opacity="0.3"/>
  <line x1="770" y1="280" x2="830" y2="250" stroke="#f75c03" stroke-width="1.5" opacity="0.25"/>
  <line x1="430" y1="280" x2="370" y2="250" stroke="#f75c03" stroke-width="1.5" opacity="0.25"/>
  <!-- 5 minute dots -->
  <circle cx="400" cy="440" r="12" fill="#f75c03" opacity="0.4"/>
  <circle cx="475" cy="440" r="12" fill="#f75c03" opacity="0.5"/>
  <circle cx="550" cy="440" r="12" fill="#f75c03" opacity="0.55"/>
  <circle cx="625" cy="440" r="12" fill="#f75c03" opacity="0.6"/>
  <circle cx="700" cy="440" r="12" fill="#f75c03" opacity="0.65"/>
  <text x="550" y="468" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" fill="#6F6A66" text-anchor="middle" opacity="0.5">5 min</text>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
    5-Minutters Morgen-Åndedræt
  </text>
</svg>