<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <linearGradient id="karmaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f75c03;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#ff9966;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Karma cycle: circular arrows -->
  <circle cx="400" cy="260" r="120" fill="none" stroke="url(#karmaGrad)" stroke-width="3" opacity="0.4" stroke-dasharray="20 10"/>
  <!-- Arrow heads on cycle -->
  <polygon points="400,140 410,155 390,155" fill="#f75c03" opacity="0.5"/>
  <polygon points="520,260 505,250 505,270" fill="#f75c03" opacity="0.5"/>
  <polygon points="400,380 390,365 410,365" fill="#f75c03" opacity="0.5"/>
  <!-- Dharma: straight ascending path -->
  <line x1="800" y1="400" x2="800" y2="100" stroke="#f75c03" stroke-width="3" opacity="0.4"/>
  <polygon points="800,100 790,120 810,120" fill="#f75c03" opacity="0.6"/>
  <!-- Stepping stones on dharma path -->
  <circle cx="800" cy="380" r="10" fill="#ff9966" opacity="0.35"/>
  <circle cx="800" cy="320" r="10" fill="#ff9966" opacity="0.4"/>
  <circle cx="800" cy="260" r="10" fill="#f75c03" opacity="0.45"/>
  <circle cx="800" cy="200" r="10" fill="#f75c03" opacity="0.5"/>
  <circle cx="800" cy="140" r="12" fill="#f75c03" opacity="0.6"/>
  <!-- Labels -->
  <text x="400" y="260" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="20" fill="#f75c03" text-anchor="middle" opacity="0.5">Karma</text>
  <text x="800" y="440" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="20" fill="#f75c03" text-anchor="middle" opacity="0.5">Dharma</text>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
    Karma, Dharma &amp; Dit Yogaliv
  </text>
</svg>