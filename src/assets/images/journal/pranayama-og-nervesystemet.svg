<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <linearGradient id="nerveGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#f75c03;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ff9966;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <!-- Central nerve/spine line -->
  <line x1="600" y1="60" x2="600" y2="460" stroke="#f75c03" stroke-width="3" opacity="0.5"/>
  <!-- Nerve branches left -->
  <path d="M 600 120 Q 450 110 350 140" stroke="#f75c03" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M 600 190 Q 450 180 300 210" stroke="#ff9966" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M 600 260 Q 450 250 320 280" stroke="#f75c03" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 600 330 Q 450 320 350 350" stroke="#ff9966" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M 600 400 Q 450 390 380 420" stroke="#f75c03" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Nerve branches right -->
  <path d="M 600 120 Q 750 110 850 140" stroke="#f75c03" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M 600 190 Q 750 180 900 210" stroke="#ff9966" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M 600 260 Q 750 250 880 280" stroke="#f75c03" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 600 330 Q 750 320 850 350" stroke="#ff9966" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M 600 400 Q 750 390 820 420" stroke="#f75c03" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Signal pulses -->
  <circle cx="350" cy="140" r="6" fill="#f75c03" opacity="0.5"/>
  <circle cx="850" cy="140" r="6" fill="#f75c03" opacity="0.5"/>
  <circle cx="300" cy="210" r="5" fill="#ff9966" opacity="0.45"/>
  <circle cx="900" cy="210" r="5" fill="#ff9966" opacity="0.45"/>
  <!-- Brain suggestion at top -->
  <ellipse cx="600" cy="60" rx="50" ry="25" fill="url(#nerveGrad)" opacity="0.4"/>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
    Åndedræt &amp; Nervesystemet
  </text>
</svg>