<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
    <radialGradient id="breathGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f5f3f0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>
  <circle cx="600" cy="240" r="200" fill="url(#breathGlow)"/>

  <!-- Nose/breath illustration (abstract) -->
  <g filter="url(#shadow)" transform="translate(600, 200)">
    <!-- Central vertical line (nose bridge) -->
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#0f0f0f" stroke-width="3" opacity="0.2"/>
    
    <!-- Left nostril breath stream -->
    <path d="M -20 40 Q -60 0 -40 -60 Q -30 -100 -60 -140" fill="none" stroke="#f75c03" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M -25 35 Q -70 -5 -50 -70 Q -38 -110 -70 -150" fill="none" stroke="#ff9966" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Right nostril breath stream -->
    <path d="M 20 40 Q 60 0 40 -60 Q 30 -100 60 -140" fill="none" stroke="#d94f02" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M 25 35 Q 70 -5 50 -70 Q 38 -110 70 -150" fill="none" stroke="#ff9966" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Nostril openings -->
    <ellipse cx="-18" cy="50" rx="14" ry="10" fill="none" stroke="#f75c03" stroke-width="3" opacity="0.8"/>
    <ellipse cx="18" cy="50" rx="14" ry="10" fill="none" stroke="#d94f02" stroke-width="3" opacity="0.8"/>
  </g>

  <!-- 5 technique indicators -->
  <g filter="url(#shadow)">
    <g transform="translate(200, 400)">
      <rect x="-55" y="-18" width="110" height="36" rx="18" fill="#f75c03" opacity="0.9"/>
      <text x="0" y="5" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Ujjayi</text>
    </g>
    <g transform="translate(370, 400)">
      <rect x="-55" y="-18" width="110" height="36" rx="18" fill="#ff9966" opacity="0.9"/>
      <text x="0" y="5" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Nadi S.</text>
    </g>
    <g transform="translate(540, 400)">
      <rect x="-55" y="-18" width="110" height="36" rx="18" fill="#d94f02" opacity="0.9"/>
      <text x="0" y="5" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Kapalabhati</text>
    </g>
    <g transform="translate(710, 400)">
      <rect x="-55" y="-18" width="110" height="36" rx="18" fill="#f75c03" opacity="0.9"/>
      <text x="0" y="5" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9" text-anchor="middle">Bhramari</text>
    </g>
    <g transform="translate(880, 400)">
      <rect x="-55" y="-18" width="110" height="36" rx="18" fill="#ff9966" opacity="0.9"/>
      <text x="0" y="5" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9" text-anchor="middle">4-7-8</text>
    </g>
  </g>

  <text x="600" y="530" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#0f0f0f" text-anchor="middle">5 Breathing Techniques</text>
  <text x="600" y="568" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" fill="#6F6A66" text-anchor="middle">For Beginners</text>
</svg>
