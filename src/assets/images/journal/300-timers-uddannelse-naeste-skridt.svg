<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <linearGradient id="advGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.3" />
      <stop offset="40%" style="stop-color:#f75c03;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#d94f02;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  <!-- 200h completed -->
  <circle cx="250" cy="280" r="60" fill="none" stroke="#ff9966" stroke-width="2" opacity="0.4"/>
  <text x="250" y="286" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="22" fill="#ff9966" text-anchor="middle" opacity="0.5">200h</text>
  <!-- Arrow bridge -->
  <line x1="330" y1="280" x2="620" y2="280" stroke="url(#advGrad)" stroke-width="3" opacity="0.4"/>
  <polygon points="620,280 608,272 608,288" fill="#f75c03" opacity="0.5"/>
  <!-- Stepping stones -->
  <circle cx="400" cy="280" r="6" fill="#f75c03" opacity="0.35"/>
  <circle cx="470" cy="280" r="7" fill="#f75c03" opacity="0.4"/>
  <circle cx="545" cy="280" r="8" fill="#f75c03" opacity="0.45"/>
  <!-- 500h destination -->
  <circle cx="750" cy="280" r="75" fill="none" stroke="#f75c03" stroke-width="3" opacity="0.5"/>
  <circle cx="750" cy="280" r="55" fill="#f75c03" opacity="0.1"/>
  <text x="750" y="275" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="26" font-weight="bold" fill="#f75c03" text-anchor="middle" opacity="0.6">500h</text>
  <text x="750" y="300" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" fill="#6F6A66" text-anchor="middle" opacity="0.4">RYT-500</text>
  <!-- Plus sign -->
  <text x="500" y="200" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="28" fill="#f75c03" text-anchor="middle" opacity="0.3">+300h</text>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
    300-Timers Uddannelse: Næste Skridt
  </text>
</svg>