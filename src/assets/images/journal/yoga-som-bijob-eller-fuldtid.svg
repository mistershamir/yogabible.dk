<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <linearGradient id="balGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#f75c03;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Balance scale -->
  <!-- Fulcrum -->
  <polygon points="600,350 580,380 620,380" fill="#f75c03" opacity="0.4"/>
  <!-- Beam -->
  <line x1="300" y1="300" x2="900" y2="300" stroke="#f75c03" stroke-width="3" opacity="0.4"/>
  <!-- Left pan (side hustle) -->
  <path d="M 280 300 L 250 380 L 450 380 L 420 300" stroke="#ff9966" stroke-width="1.5" fill="#ff9966" fill-opacity="0.1" opacity="0.4"/>
  <text x="350" y="350" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" fill="#6F6A66" text-anchor="middle" opacity="0.5">Bijob</text>
  <!-- Right pan (full time) -->
  <path d="M 780 300 L 750 380 L 950 380 L 920 300" stroke="#f75c03" stroke-width="1.5" fill="#f75c03" fill-opacity="0.1" opacity="0.4"/>
  <text x="850" y="350" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" fill="#6F6A66" text-anchor="middle" opacity="0.5">Fuldtid</text>
  <!-- Income chart lines above -->
  <rect x="200" cy="120" y="160" width="30" height="100" rx="4" fill="#ff9966" opacity="0.2"/>
  <rect x="250" cy="120" y="140" width="30" height="120" rx="4" fill="#ff9966" opacity="0.25"/>
  <rect x="300" cy="120" y="120" width="30" height="140" rx="4" fill="#ff9966" opacity="0.3"/>
  <rect x="850" y="100" width="30" height="160" rx="4" fill="#f75c03" opacity="0.2"/>
  <rect x="900" y="80" width="30" height="180" rx="4" fill="#f75c03" opacity="0.25"/>
  <rect x="950" y="60" width="30" height="200" rx="4" fill="#f75c03" opacity="0.3"/>
  <!-- Question mark -->
  <text x="600" y="240" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="50" fill="#f75c03" text-anchor="middle" opacity="0.2">?</text>
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#0f0f0f" text-anchor="middle">
    Yoga som Bijob eller Fuldtid?
  </text>
</svg>