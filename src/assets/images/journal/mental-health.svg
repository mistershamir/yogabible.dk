<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f5f3f0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>
  <circle cx="600" cy="250" r="220" fill="url(#innerGlow)"/>

  <!-- Head silhouette (profile) -->
  <g filter="url(#shadow)" transform="translate(600, 220)">
    <path d="M -100 80 C -100 -40 -60 -120 20 -130 C 100 -140 140 -80 140 -20 C 140 30 120 60 100 80 L 80 80 L 80 110 L -20 110 L -20 80 Z" fill="none" stroke="#0f0f0f" stroke-width="3" opacity="0.25"/>
    
    <!-- Brain area - positive connections -->
    <g opacity="0.7">
      <!-- Neural network dots -->
      <circle cx="-20" cy="-80" r="8" fill="#f75c03" opacity="0.8"/>
      <circle cx="30" cy="-100" r="10" fill="#ff9966" opacity="0.85"/>
      <circle cx="80" cy="-70" r="8" fill="#d94f02" opacity="0.8"/>
      <circle cx="60" cy="-30" r="9" fill="#f75c03" opacity="0.85"/>
      <circle cx="10" cy="-50" r="11" fill="#ff9966" opacity="0.9"/>
      <circle cx="-40" cy="-40" r="7" fill="#d94f02" opacity="0.75"/>
      <circle cx="100" cy="-30" r="7" fill="#ff9966" opacity="0.7"/>
      
      <!-- Neural connections -->
      <line x1="-20" y1="-80" x2="30" y2="-100" stroke="#f75c03" stroke-width="1.5" opacity="0.5"/>
      <line x1="30" y1="-100" x2="80" y2="-70" stroke="#ff9966" stroke-width="1.5" opacity="0.5"/>
      <line x1="80" y1="-70" x2="60" y2="-30" stroke="#d94f02" stroke-width="1.5" opacity="0.5"/>
      <line x1="10" y1="-50" x2="-20" y2="-80" stroke="#ff9966" stroke-width="1.5" opacity="0.5"/>
      <line x1="10" y1="-50" x2="60" y2="-30" stroke="#f75c03" stroke-width="1.5" opacity="0.5"/>
      <line x1="-40" y1="-40" x2="10" y2="-50" stroke="#d94f02" stroke-width="1.5" opacity="0.5"/>
      <line x1="30" y1="-100" x2="10" y2="-50" stroke="#f75c03" stroke-width="1.5" opacity="0.4"/>
    </g>
  </g>

  <!-- Meditation figure (small, bottom) -->
  <g transform="translate(600, 420)" opacity="0.6">
    <circle cx="0" cy="-20" r="8" fill="#f75c03"/>
    <path d="M -20 10 Q 0 -5 20 10" fill="none" stroke="#f75c03" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-12" x2="0" y2="5" stroke="#f75c03" stroke-width="3"/>
  </g>

  <!-- Radiating calm waves -->
  <g opacity="0.15">
    <circle cx="600" cy="420" r="30" fill="none" stroke="#f75c03" stroke-width="1.5"/>
    <circle cx="600" cy="420" r="50" fill="none" stroke="#ff9966" stroke-width="1"/>
    <circle cx="600" cy="420" r="70" fill="none" stroke="#f75c03" stroke-width="0.8"/>
  </g>

  <text x="600" y="540" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Yoga and Mental Health</text>
  <text x="600" y="578" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" fill="#6F6A66" text-anchor="middle">Rewiring the Mind Through Practice</text>
</svg>
