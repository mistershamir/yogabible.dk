<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25" flood-color="#000"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>
  <circle cx="100" cy="120" r="110" fill="#ff9966" opacity="0.07"/>
  <circle cx="1100" cy="500" r="140" fill="#f75c03" opacity="0.06"/>
  <circle cx="600" cy="50" r="80" fill="#d94f02" opacity="0.04"/>

  <!-- Balance scale base -->
  <g filter="url(#shadow)">
    <line x1="600" y1="120" x2="600" y2="380" stroke="#6F6A66" stroke-width="6" stroke-linecap="round"/>
    <circle cx="600" cy="115" r="12" fill="#f75c03"/>
    <line x1="300" y1="200" x2="900" y2="200" stroke="#6F6A66" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Left pan — tilted up (other schools) -->
  <g filter="url(#shadow)">
    <line x1="300" y1="200" x2="250" y2="230" stroke="#6F6A66" stroke-width="2"/>
    <line x1="300" y1="200" x2="350" y2="230" stroke="#6F6A66" stroke-width="2"/>
    <ellipse cx="300" cy="240" rx="90" ry="18" fill="#E8E4E0" opacity="0.9"/>
    <ellipse cx="300" cy="238" rx="90" ry="18" fill="#FFFCF9"/>
  </g>

  <!-- Right pan — tilted down (Yoga Bible, heavier = more value) -->
  <g filter="url(#shadow)">
    <line x1="900" y1="200" x2="850" y2="230" stroke="#6F6A66" stroke-width="2"/>
    <line x1="900" y1="200" x2="950" y2="230" stroke="#6F6A66" stroke-width="2"/>
    <ellipse cx="900" cy="240" rx="90" ry="18" fill="#f75c03" opacity="0.15"/>
    <ellipse cx="900" cy="238" rx="90" ry="18" fill="#FFFCF9"/>
  </g>

  <!-- School dots on left pan -->
  <circle cx="260" cy="225" r="14" fill="#E8E4E0" stroke="#6F6A66" stroke-width="1.5"/>
  <circle cx="300" cy="220" r="14" fill="#E8E4E0" stroke="#6F6A66" stroke-width="1.5"/>
  <circle cx="340" cy="225" r="14" fill="#E8E4E0" stroke="#6F6A66" stroke-width="1.5"/>

  <!-- Yoga Bible dot on right pan (highlighted) -->
  <circle cx="900" cy="222" r="18" fill="#f75c03" opacity="0.9"/>
  <text x="900" y="228" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9" text-anchor="middle">YB</text>

  <!-- Comparison table rows -->
  <g transform="translate(160, 300)">
    <!-- Header row -->
    <rect x="0" y="0" width="880" height="36" rx="6" fill="#f75c03" opacity="0.9"/>
    <text x="20" y="24" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9">Skole</text>
    <text x="280" y="24" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9">Timer</text>
    <text x="400" y="24" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9">Pris</text>
    <text x="560" y="24" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9">Yoga Alliance</text>
    <text x="740" y="24" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFCF9">Format</text>

    <!-- Row 1 -->
    <rect x="0" y="40" width="880" height="32" rx="4" fill="#FFFCF9"/>
    <text x="20" y="61" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">Dòttir Hot Yoga</text>
    <text x="280" y="61" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">200</text>
    <text x="400" y="61" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">23.500</text>
    <text x="560" y="61" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">Ja</text>
    <text x="740" y="61" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">16 uger</text>

    <!-- Row 2 — Yoga Bible highlighted -->
    <rect x="0" y="76" width="880" height="32" rx="4" fill="#f75c03" opacity="0.08"/>
    <rect x="0" y="76" width="880" height="32" rx="4" fill="none" stroke="#f75c03" stroke-width="1.5"/>
    <text x="20" y="97" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f0f0f">Yoga Bible</text>
    <text x="280" y="97" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f0f0f">200</text>
    <text x="400" y="97" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f0f0f">23.750</text>
    <text x="560" y="97" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f0f0f">Ja</text>
    <text x="740" y="97" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f0f0f">4/8/18 uger</text>

    <!-- Row 3 -->
    <rect x="0" y="112" width="880" height="32" rx="4" fill="#FFFCF9"/>
    <text x="20" y="133" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">Kailo Yoga</text>
    <text x="280" y="133" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">200</text>
    <text x="400" y="133" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">26.000+</text>
    <text x="560" y="133" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">Ja</text>
    <text x="740" y="133" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">Intensiv / Indien</text>

    <!-- Row 4 -->
    <rect x="0" y="148" width="880" height="32" rx="4" fill="#FFFCF9"/>
    <text x="20" y="169" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">The Yoga Flat</text>
    <text x="280" y="169" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">200</text>
    <text x="400" y="169" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">26.500</text>
    <text x="560" y="169" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">?</text>
    <text x="740" y="169" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">~3,5 mdr.</text>

    <!-- Row 5 -->
    <rect x="0" y="184" width="880" height="32" rx="4" fill="#FFFCF9"/>
    <text x="20" y="205" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">Yum Yoga</text>
    <text x="280" y="205" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">200</text>
    <text x="400" y="205" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">28.995*</text>
    <text x="560" y="205" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">Ja</text>
    <text x="740" y="205" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="12" fill="#6F6A66">Weekend / intensiv</text>
  </g>

  <!-- VAT asterisk note -->
  <text x="560" y="520" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="11" fill="#6F6A66" text-anchor="middle">* ekskl. moms</text>

  <!-- Title -->
  <text x="600" y="560" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="34" font-weight="bold" fill="#0f0f0f" text-anchor="middle">YTT i København 2026</text>
  <text x="600" y="595" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="18" fill="#6F6A66" text-anchor="middle">Den ærlige sammenligning</text>
</svg>