  <path d="M 350 200 Q 600 80 850 200" stroke="#f75c03" stroke-width="2.5" fill="none" opacity="0.35"/>
  <path d="M 380 240 Q 600 140 820 240" stroke="#ff9966" stroke-width="2" fill="none" opacity="0.3"/>
