  <circle cx="600" cy="280" r="25" fill="#f75c03" opacity="0.2"/>
  <circle cx="600" cy="280" r="10" fill="#f75c03" opacity="0.35"/>
  <!-- Gentle bloom petals -->
  <ellipse cx="560" cy="240" rx="20" ry="35" fill="#ff9966" opacity="0.15" transform="rotate(-20 560 240)"/>
  <ellipse cx="640" cy="240" rx="20" ry="35" fill="#ff9966" opacity="0.15" transform="rotate(20 640 240)"/>
  <ellipse cx="560" cy="320" rx="20" ry="35" fill="#f75c03" opacity="0.12" transform="rotate(20 560 320)"/>
