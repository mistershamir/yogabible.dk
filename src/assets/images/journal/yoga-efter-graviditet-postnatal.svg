<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f5f3f0"/>
  <defs>
    <radialGradient id="nurture" cx="50%" cy="45%" r="30%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#f5f3f0;stop-opacity:0" />
    </radialGradient>
  </defs>
  <circle cx="600" cy="270" r="200" fill="url(#nurture)"/>
