<svg viewBox=\"0 0 1200 630\" xmlns=\"http://www.w3.org/2000/svg\">
  <defs>
    <linearGradient id=\"grad-orange\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">
      <stop offset=\"0%\" style=\"stop-color:#ff9966;stop-opacity:1\" />
      <stop offset=\"100%\" style=\"stop-color:#f75c03;stop-opacity:1\" />
    </linearGradient>
    <linearGradient id=\"grad-dark\" x1=\"0%\" y1=\"0%\" x2=\"100%\" y2=\"100%\">
      <stop offset=\"0%\" style=\"stop-color:#f75c03;stop-opacity:1\" />
      <stop offset=\"100%\" style=\"stop-color:#d94f02;stop-opacity:1\" />
    </linearGradient>
    <filter id=\"shadow\">
      <feDropShadow dx=\"3\" dy=\"6\" stdDeviation=\"4\" flood-opacity=\"0.3\"/>
    </filter>
    <filter id=\"glow\">
      <feGaussianBlur stdDeviation=\"3\" result=\"coloredBlur\"/>
      <feMerge><feMergeNode in=\"coloredBlur\"/><feMergeNode in=\"SourceGraphic\"/></feMerge>
    </filter>
  </defs>
  <rect width=\"1200\" height=\"630\" fill=\"#f5f3f0\"/>
  <circle cx=\"150\" cy=\"100\" r=\"80\" fill=\"#ff9966\" opacity=\"0.12\"/>
  <circle cx=\"1050\" cy=\"500\" r=\"120\" fill=\"#f75c03\" opacity=\"0.1\"/>
  <g filter=\"url(#shadow)\">
    <rect x=\"200\" y=\"380\" width=\"100\" height=\"100\" rx=\"8\" fill=\"url(#grad-orange)\" opacity=\"0.95\" stroke=\"#d94f02\" stroke-width=\"4\"/>
    <rect x=\"350\" y=\"300\" width=\"110\" height=\"180\" rx=\"8\" fill=\"url(#grad-orange)\" opacity=\"0.9\" stroke=\"#d94f02\" stroke-width=\"4\"/>
    <rect x=\"500\" y=\"200\" width=\"120\" height=\"280\" rx=\"8\" fill=\"url(#grad-dark)\" opacity=\"0.92\" stroke=\"#0f0f0f\" stroke-width=\"4\"/>
    <rect x=\"650\" y=\"80\" width=\"130\" height=\"400\" rx=\"8\" fill=\"url(#grad-dark)\" opacity=\"0.95\" stroke=\"#0f0f0f\" stroke-width=\"4\"/>
    <rect x=\"800\" y=\"20\" width=\"140\" height=\"460\" rx=\"8\" fill=\"#f75c03\" opacity=\"0.98\" stroke=\"#d94f02\" stroke-width=\"5\"/>
  </g>
  <polyline points=\"250,380 405,300 560,200 715,80 870,20\" fill=\"none\" stroke=\"#0f0f0f\" stroke-width=\"6\" stroke-linecap=\"round\" opacity=\"0.7\"/>
  <polygon points=\"870,20 850,50 890,45\" fill=\"#0f0f0f\" opacity=\"0.8\"/>
  <g filter=\"url(#glow)\">
    <circle cx=\"250\" cy=\"380\" r=\"12\" fill=\"#ff9966\" opacity=\"0.9\"/>
    <circle cx=\"405\" cy=\"300\" r=\"14\" fill=\"#ff9966\" opacity=\"0.9\"/>
    <circle cx=\"560\" cy=\"200\" r=\"16\" fill=\"#f75c03\" opacity=\"0.95\"/>
    <circle cx=\"715\" cy=\"80\" r=\"18\" fill=\"#f75c03\" opacity=\"0.95\"/>
    <circle cx=\"870\" cy=\"20\" r=\"20\" fill=\"#d94f02\" opacity=\"1\"/>
  </g>
  <text x=\"600\" y=\"590\" font-family=\"Abacaxi, Helvetica, Arial, sans-serif\" font-size=\"38\" font-weight=\"bold\" fill=\"#0f0f0f\" text-anchor=\"middle\">Teacher Training Growth</text>
</svg>