<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="balanceShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-opacity="0.35" flood-color="#000"/>
    </filter>
    <linearGradient id="balanceLeftGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f75c03;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="balanceRightGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f75c03;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d94f02;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#f5f3f0"/>

  <circle cx="100" cy="200" r="100" fill="#ff9966" opacity="0.08"/>
  <circle cx="1100" cy="400" r="130" fill="#f75c03" opacity="0.09"/>

  <!-- Central balance line -->
  <line x1="600" y1="60" x2="600" y2="520" stroke="#0f0f0f" stroke-width="5" opacity="0.25" stroke-linecap="round"/>
  <line x1="600" y1="65" x2="600" y2="515" stroke="#f75c03" stroke-width="2" opacity="0.5" stroke-dasharray="10,8"/>

  <!-- Left inverted figure -->
  <g filter="url(#balanceShadow)">
    <!-- Head pointing down -->
    <circle cx="420" cy="520" r="28" fill="url(#balanceLeftGrad)" opacity="0.93" stroke="#d94f02" stroke-width="3"/>

    <!-- Body inverted -->
    <ellipse cx="420" cy="430" rx="38" ry="55" fill="url(#balanceLeftGrad)" opacity="0.88" stroke="#d94f02" stroke-width="3"/>

    <!-- Left arm -->
    <line x1="400" y1="380" x2="320" y2="280" stroke="url(#balanceLeftGrad)" stroke-width="15" stroke-linecap="round" opacity="0.89"/>
    <circle cx="320" cy="280" r="17" fill="#ff9966" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Right arm -->
    <line x1="440" y1="380" x2="520" y2="280" stroke="url(#balanceLeftGrad)" stroke-width="15" stroke-linecap="round" opacity="0.89"/>
    <circle cx="520" cy="280" r="17" fill="#ff9966" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Left leg -->
    <line x1="400" y1="375" x2="360" y2="200" stroke="url(#balanceLeftGrad)" stroke-width="14" stroke-linecap="round" opacity="0.87"/>
    <circle cx="360" cy="200" r="15" fill="#d94f02" opacity="0.9" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Right leg -->
    <line x1="440" y1="375" x2="480" y2="200" stroke="url(#balanceLeftGrad)" stroke-width="14" stroke-linecap="round" opacity="0.87"/>
    <circle cx="480" cy="200" r="15" fill="#d94f02" opacity="0.9" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Support circle outline -->
    <circle cx="420" cy="480" r="65" fill="none" stroke="#f75c03" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Right inverted figure (mirrored) -->
  <g filter="url(#balanceShadow)">
    <!-- Head pointing down -->
    <circle cx="780" cy="520" r="28" fill="url(#balanceRightGrad)" opacity="0.93" stroke="#0f0f0f" stroke-width="3"/>

    <!-- Body inverted -->
    <ellipse cx="780" cy="430" rx="38" ry="55" fill="url(#balanceRightGrad)" opacity="0.88" stroke="#0f0f0f" stroke-width="3"/>

    <!-- Left arm -->
    <line x1="760" y1="380" x2="680" y2="280" stroke="url(#balanceRightGrad)" stroke-width="15" stroke-linecap="round" opacity="0.89"/>
    <circle cx="680" cy="280" r="17" fill="#f75c03" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Right arm -->
    <line x1="800" y1="380" x2="880" y2="280" stroke="url(#balanceRightGrad)" stroke-width="15" stroke-linecap="round" opacity="0.89"/>
    <circle cx="880" cy="280" r="17" fill="#f75c03" opacity="0.92" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Left leg -->
    <line x1="760" y1="375" x2="720" y2="200" stroke="url(#balanceRightGrad)" stroke-width="14" stroke-linecap="round" opacity="0.87"/>
    <circle cx="720" cy="200" r="15" fill="#ff9966" opacity="0.9" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Right leg -->
    <line x1="800" y1="375" x2="840" y2="200" stroke="url(#balanceRightGrad)" stroke-width="14" stroke-linecap="round" opacity="0.87"/>
    <circle cx="840" cy="200" r="15" fill="#ff9966" opacity="0.9" stroke="#0f0f0f" stroke-width="2"/>

    <!-- Support circle outline -->
    <circle cx="780" cy="480" r="65" fill="none" stroke="#d94f02" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Balance equilibrium markers -->
  <g opacity="0.7" filter="url(#balanceShadow)">
    <circle cx="300" cy="120" r="5" fill="#f75c03"/>
    <circle cx="600" cy="100" r="6" fill="#d94f02"/>
    <circle cx="900" cy="120" r="5" fill="#f75c03"/>
  </g>

  <!-- Grounding element -->
  <ellipse cx="600" cy="540" rx="150" ry="25" fill="url(#balanceLeftGrad)" opacity="0.6" stroke="#0f0f0f" stroke-width="3" filter="url(#balanceShadow)"/>

  <text x="600" y="590" font-family="Abacaxi, Helvetica, Arial, sans-serif" font-size="38" font-weight="bold" fill="#0f0f0f" text-anchor="middle">Inversions Balance</text>
</svg>
