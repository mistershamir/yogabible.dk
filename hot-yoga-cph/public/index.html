<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Yoga Copenhagen — Min Profil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #F5F3F0; color: #0F0F0F; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 16px; padding: 48px; max-width: 440px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #6F6A66; font-size: .95rem; line-height: 1.5; }
    .dot { display: inline-block; width: 10px; height: 10px; background: #3f99a5; border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="dot"></span>Kommer snart</h1>
    <p>Medlemsområdet for Hot Yoga Copenhagen er på vej. Vi arbejder på det.</p>
  </div>
</body>
</html>
