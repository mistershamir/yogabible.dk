[build]
  command = "sh build.sh"
  publish = "dist"
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Noindex member-only pages (profile app)
[[headers]]
  for = "/index.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Allow AI crawlers to read llms.txt
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "index, follow"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=86400"

# CORS + caching for public SEO pages
[[headers]]
  for = "/faq.html"
  [headers.values]
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/classes.html"
  [headers.values]
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/pricing.html"
  [headers.values]
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600"

# CORS headers for checkout-embed.js (loaded from Framer site)
[[headers]]
  for = "/js/checkout-embed.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

# CORS headers for schedule-embed.js (loaded from Framer site)
[[headers]]
  for = "/js/schedule-embed.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

# CORS headers for login-cta.js (loaded from Framer site)
[[headers]]
  for = "/js/login-cta.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
