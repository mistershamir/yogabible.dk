# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://www.googletagmanager.com https://connect.facebook.net https://www.clarity.ms https://apis.google.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://yogabible.b-cdn.net https://www.yogabible.dk https://*.google-analytics.com https://*.googletagmanager.com https://www.facebook.com https://*.clarity.ms https://image.mux.com; font-src 'self' data:; connect-src 'self' https://*.netlify.com https://*.netlify.app https://*.firebaseio.com https://*.googleapis.com https://*.mindbodyonline.com https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://www.facebook.com https://connect.facebook.net https://*.clarity.ms https://graph.facebook.com https://graph.instagram.com https://storage.bunnycdn.com https://stream.mux.com https://*.mux.com https://*.litix.io wss://*.livekit.cloud https://*.livekit.cloud; media-src 'self' blob: https://yogabible.b-cdn.net https://www.yogabible.dk https://stream.mux.com; worker-src 'self' blob:; frame-src 'self' https://www.googletagmanager.com https://yogabible.dk https://*.firebaseapp.com https://w.soundcloud.com https://player.mux.com; frame-ancestors 'self'"

# Cache: fonts (1 year)
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache: images (1 year)
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache: CSS/JS (short cache + stale-while-revalidate for repeat visits)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Cache: favicons (1 year)
[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
