[build]
  command = "node scripts/write-firebase-key.js && npx @11ty/eleventy && node scripts/minify-js.js && node scripts/critical-css.js && node scripts/seo-validator.js"
  publish = "_site"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin"]

# Scheduled function: process sequences every 30 minutes
[functions."process-sequences"]
  schedule = "*/30 * * * *"

# Scheduled function: auto-close zombie LiveKit rooms every 5 minutes
[functions."live-room-cleanup"]
  schedule = "*/5 * * * *"

# Redirect www to non-www (301)
[[redirects]]
  from = "https://www.yogabible.dk/*"
  to = "https://yogabible.dk/:splat"
  status = 301
  force = true

# Redirect old en subdomain to /en/ path prefix (301)
[[redirects]]
  from = "https://en.yogabible.dk/*"
  to = "https://yogabible.dk/en/:splat"
  status = 301
  force = true

